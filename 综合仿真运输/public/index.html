<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>综合运输车辆仿真模拟系统</title>
  <link rel="stylesheet" href="styles.css">
  <!-- 高德地图API -->
  <script type="text/javascript" src="https://webapi.amap.com/maps?v=1.4.15&key=3045d74b06c641ee9c7c190ba1195abe"></script>
  <!-- Socket.IO客户端 -->
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>综合运输车辆仿真模拟系统</h1>
      <div class="control-panel">
        <button id="startBtn" class="btn btn-primary">开始仿真</button>
        <button id="stopBtn" class="btn btn-warning">停止仿真</button>
        <button id="resetBtn" class="btn btn-danger">重置仿真</button>
        <div class="time-scale">
          <span class="time-scale-label">时间流速</span>
          <select id="timeScaleSelect" class="time-scale-select" aria-label="时间流速">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="5">5x</option>
            <option value="10">10x</option>
          </select>
        </div>
        <span id="vehicleCount" class="info">车辆数量: 0</span>
      </div>
    </header>
    
    <main class="main-content">
      <div id="mapContainer" class="map-container"></div>
      
      <div class="sidebar">
        <div class="panel">
          <h3>POI 类型筛选</h3>
          <div class="poi-filter-actions">
            <button id="poiSelectAllBtn" class="btn btn-primary btn-sm" type="button">全选</button>
            <button id="poiClearAllBtn" class="btn btn-warning btn-sm" type="button">全不选</button>
          </div>
          <div id="poiFilterList" class="poi-filter-list">
            <p>加载中...</p>
          </div>
        </div>
        
        <div class="panel">
          <h3>待接订单池 <span id="pendingOrdersCount" class="pending-orders-count">0</span></h3>
          <p class="pending-orders-hint">以下为各工厂队列中尚未被接走的订单，无需到达工厂即可查看。</p>
          <div id="pendingOrdersList" class="pending-orders-list">
            <p>加载中...</p>
          </div>
        </div>
        
        <div class="panel">
          <h3>实时数据</h3>
          <div id="realTimeData">
            <p>等待数据更新...</p>
          </div>
        </div>
        
        <div class="panel">
          <h3>车辆列表</h3>
          <div id="vehicleList" class="vehicle-list">
            <p>加载中...</p>
          </div>
        </div>
      </div>
    </main>
    
    <footer class="footer">
      <p>&copy; 2024 综合运输车辆仿真模拟系统 | 基于高德地图API开发</p>
    </footer>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
